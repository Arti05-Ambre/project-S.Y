{% extends 'base.html' %}
{% block content %}
<div class="form-box">
    <h2>Student Login</h2>
    <form method="post">
        <label>Email:</label>
        <input type="email" name="email" required>
        <label>Password:</label>
        <input type="password" name="password" required>
        <input type="submit" value="Login" class="btn">
    </form>
</div>
{% endblock %}
