{% extends 'base.html' %}
{% block content %}
<div class="form-box">
    <h2>Admin Login</h2>
    <form method="post">
        <label>Username:</label>
         <input type="text" name="username" required>
        <label>Password:</label>
        <input type="password" name="password" required>
        <input type="submit" value="Login" class="btn">
    </form>
</div>
{% endblock %}
